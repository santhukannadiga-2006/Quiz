<!DOCTYPE html>
<html>
<head>
<title>Chained IT Quiz</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
    padding: 0;
    text-align: center;
}

/* Mobile container */
.quiz-box {
    width: 95%;
    max-width: 420px;
    margin: 15px auto;
    padding: 15px;
    border-radius: 12px;
    border: 2px solid #38bdf8;
    background: #020617;
}

/* Code */
pre {
    text-align: left;
    font-size: 13px;
    padding: 10px;
    border-radius: 6px;
    overflow-x: auto;
}

/* Input */
input {
    width: 95%;
    padding: 14px;
    margin-top: 10px;
    border-radius: 6px;
    border: 1px solid #38bdf8;
    background: #0f172a;
    color: white;
    font-size: 16px;
}

/* Button */
button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border-radius: 6px;
    border: none;
    background: #38bdf8;
    font-size: 16px;
}

/* Timer */
.timer {
    font-size: 20px;
    color: #f87171;
    margin: 10px;
}

.hidden { display: none; }
</style>
</head>

<body>

<h2>⚡ Chained IT Quiz ⚡</h2>

<div>
<input id="username" placeholder="Enter your name">
<button onclick="startQuiz()">Start Quiz</button>
</div>

<div class="timer hidden" id="timer">Time: 60</div>

<div class="quiz-box hidden" id="quizBox">

<div id="q1">
<pre>int x=5; x=x++ + ++x;</pre>
<input id="a1"><button onclick="check1()">Submit</button>
</div>

<div id="q2" class="hidden">
<pre>int a=A1; int b=a++*2+--a;</pre>
<input id="a2"><button onclick="check2()">Submit</button>
</div>

<div id="q3" class="hidden">
<pre>int x=A2; int y=x^(x<<1);</pre>
<input id="a3"><button onclick="check3()">Submit</button>
</div>

<div id="q4" class="hidden">
<pre>String s="A3"; s+5+5;</pre>
<input id="a4"><button onclick="check4()">Submit</button>
</div>

<div id="q5" class="hidden">
<pre>let x="A4"; x-10;</pre>
<input id="a5"><button onclick="check5()">Submit</button>
</div>

<div id="q6" class="hidden">
<pre>while(n>0){n/=2;count++;}</pre>
<input id="a6"><button onclick="check6()">Submit</button>
</div>

<div id="q7" class="hidden">
<pre>sum of even numbers</pre>
<input id="a7"><button onclick="check7()">Submit</button>
</div>

</div>

<script>

// Anti-refresh
if (sessionStorage.getItem("started")) {
    document.body.innerHTML = "<h2 style='color:red'>❌ Disqualified (Refresh)</h2>";
}
sessionStorage.setItem("started","true");

let user="";
let answers=["12","36","108","10855","10845","14","42"];
let current=0,time=60,timer;

function startQuiz(){
    user=document.getElementById("username").value.trim();
    if(!user) return alert("Enter name");

    document.getElementById("quizBox").classList.remove("hidden");
    document.getElementById("timer").classList.remove("hidden");
    startTimer();
}

function startTimer(){
    clearInterval(timer);
    time=60;
    timer=setInterval(()=>{
        document.getElementById("timer").innerText="Time:"+time;
        time--;
        if(time<0) disqualify();
    },1000);
}

function next(){
    document.getElementById("q"+(current+1)).classList.add("hidden");
    current++;
    if(current==7) return finish();
    document.getElementById("q"+(current+1)).classList.remove("hidden");
    startTimer();
}

function check(val){
    if(val.trim()===answers[current]) next();
    else alert("❌ Wrong");
}

function check1(){check(a1.value)}
function check2(){check(a2.value)}
function check3(){check(a3.value)}
function check4(){check(a4.value)}
function check5(){check(a5.value)}
function check6(){check(a6.value)}
function check7(){check(a7.value)}

function disqualify(){
    clearInterval(timer);
    document.body.innerHTML="<h2 style='color:red'>❌ Disqualified (Time Up)</h2>";
}

function finish(){
    clearInterval(timer);
    document.body.innerHTML="<h2>🎉 Completed</h2>";
}

</script>

</body>
</html>
